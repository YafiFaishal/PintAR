<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindAR Simple Test</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .test-ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="test-ui">
      <h3>Test Sederhana AR</h3>
      <p>1. Izinkan kamera saat muncul peringatan.</p>
      <p>2. Sorot gambar Beruang/Rakun (marker.png) di HP/layar lain.</p>
      <p>3. Sebuah kotak biru akan muncul menutupi gambar!</p>
    </div>
    
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <!-- Anchor untuk marker pertama (index 0) -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Kotak Biru Transparan -->
        <a-plane color="#0066FF" opacity="0.8" position="0 0 0" height="1" width="1" rotation="0 0 0"></a-plane>
        <!-- Teks Tiga Dimensi -->
        <a-text value="AR BERHASIL!" color="white" align="center" width="2" position="0 0 0.1"></a-text>
      </a-entity>
    </a-scene>
  </body>
</html>
